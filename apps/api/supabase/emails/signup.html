<style>
	body {
		font-family: Satoshi, sans-serif, Helvetica;
	}
	h2 {
		font-size: 16px;
		line-height: 24px;
		margin-bottom: 4px;
	}
	p {
		font-size: 14px;
		line-height: 20px;
		color: #525252;
	}
	.button {
		background: black;
		padding: 9px 14px;
		text-decoration: none;
		font-size: 14px;
		line-height: 20px;
		color: white;
		border-radius: 5px;
	}
	a {
		border-bottom: solid 1px #525252;
		text-decoration: none;
	}
	hr {
		background: #e5e5e5;
		display: inline-block;
		margin: 18px 0 5px;
		height: 1px;
		border: 0;
		width: 100%;
	}
	article {
		border: solid 1px #e5e5e5;
		max-width: 600px;
		min-width: 430px;
		padding: 24px;
		border-radius: 5px;
		width: 50%;
	}
	footer p {
		font-size: 12px;
		line-height: 16px;
		color: #525252;
	}
</style>

<article>
	<h2>Verify your email</h2>
	<p style="margin-top: 0">Please verify your account by clicking the link below.</p>

	<p style="padding-top: 20px">
		<a
			href="{{ .SiteURL }}/api/auth/confirm?token_hash={{ .TokenHash }}&type=signup&next={{ .RedirectTo }}"
			class="button"
		>
			Confirm email
		</a>
	</p>

	<hr />

	<footer>
		<p>
			Add your footer here
		</p>
	</footer>
</article>
